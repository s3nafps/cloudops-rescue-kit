services:
  seed:
    image: alpine:3.20
    command: sh -c "cp /seed/index.html /target/index.html && echo seeded"
    volumes:
      - demo-web:/target
      - ${PWD}/demo/demo-site:/seed:ro

  web:
    image: nginx:1.27-alpine
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "8088:80"
    volumes:
      - demo-web:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  demo-web:
